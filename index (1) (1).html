<!DOCTYPE html>
<html>
<head>

<title>🇲🇽 FAM Air Force Simulator</title>

<style>

body{
background:linear-gradient(135deg,#006847,#111,#ce1126);
color:white;
font-family:Arial;
text-align:center;
}

.panel{
background:#111d;
margin:15px auto;
padding:20px;
border-radius:20px;
max-width:650px;
box-shadow:0 0 20px black;
}

button{
padding:12px;
margin:5px;
border:0;
border-radius:12px;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.08);
background:#00ff88;
}

input{
padding:12px;
border-radius:10px;
border:0;
}

h1{
color:#ffd700;
}

h2,h3{
color:#00ff88;
}

li{
list-style:none;
background:#222;
margin:5px;
padding:8px;
border-radius:10px;
}

.oculto{
display:none;
}

</style>

</head>


<body>


<h1>🦅🇲🇽 Fuerza Aérea Mexicana Simulator</h1>


<div class="panel" id="registro">

<h2>🪪 Crear Piloto</h2>

<input id="nombreNuevo" placeholder="Nombre del piloto">

<br><br>

<button onclick="crearPiloto()">
Entrar a la FAM
</button>

</div>



<div id="juego" class="oculto">


<div class="panel">

<h2>🎖️ Perfil del Piloto</h2>

<p>👨‍✈️ Nombre: <b id="nombre"></b></p>

<p>🎖️ Rango: <b id="rango"></b></p>

<p>⭐ Nivel: <b id="nivel"></b></p>

<p>💰 Qwip: <b id="qwip"></b></p>

<p>🔬 Tecnología: <b id="tec"></b></p>

</div>



<div class="panel">

<h2>⚔️ Misiones Aéreas</h2>

<button onclick="mision()">
Realizar misión
</button>

<p id="mensaje"></p>

</div>



<div class="panel">

<h2>✈️ Mercado Aéreo</h2>


<h3>🔥 Cazas</h3>


<button onclick="comprar('F-5 Tiger II',25000)">
F-5 Tiger II<br>25000 Qwip
</button>


<button onclick="comprar('F-16 Falcon',50000)">
F-16 Falcon<br>50000 Qwip
</button>


<button onclick="comprar('F-15 Eagle',70000)">
F-15 Eagle<br>70000 Qwip
</button>


<button onclick="comprar('F/A-18 Super Hornet',85000)">
F/A-18 Super Hornet<br>85000 Qwip
</button>


<button onclick="comprar('F-22 Raptor',120000)">
F-22 Raptor<br>120000 Qwip
</button>


<button onclick="comprar('F-35 Lightning II',150000)">
F-35 Lightning II<br>150000 Qwip
</button>


<button onclick="comprar('Su-57 Felon',130000)">
Su-57 Felon<br>130000 Qwip
</button>


<button onclick="comprar('Rafale C',90000)">
Rafale C<br>90000 Qwip
</button>
<h3>💣 Bombarderos</h3>

<button onclick="comprar('B-1 Lancer',200000)">
B-1 Lancer<br>200000 Qwip
</button>

<button onclick="comprar('B-2 Spirit',350000)">
B-2 Spirit<br>350000 Qwip
</button>

<button onclick="comprar('B-52 Stratofortress',250000)">
B-52 Stratofortress<br>250000 Qwip
</button>


<h3>📦 Transporte y Carga</h3>

<button onclick="comprar('C-17 Globemaster III',180000)">
C-17 Globemaster III<br>180000 Qwip
</button>

<button onclick="comprar('C-130 Hercules',90000)">
C-130 Hercules<br>90000 Qwip
</button>

<button onclick="comprar('A400M Atlas',190000)">
A400M Atlas<br>190000 Qwip
</button>

<button onclick="comprar('Antonov An-124',300000)">
Antonov An-124<br>300000 Qwip
</button>


<h3>⛽ Reabastecimiento</h3>

<button onclick="comprar('KC-135 Stratotanker',160000)">
KC-135<br>160000 Qwip
</button>

<button onclick="comprar('KC-46 Pegasus',220000)">
KC-46 Pegasus<br>220000 Qwip
</button>


<h3>🚁 Helicópteros</h3>

<button onclick="comprar('AH-64 Apache',100000)">
AH-64 Apache<br>100000 Qwip
</button>

<button onclick="comprar('CH-47 Chinook',85000)">
CH-47 Chinook<br>85000 Qwip
</button>


</div>



<div class="panel">

<h2>📦 Mi Hangar</h2>

<ul id="hangar"></ul>

</div>



<div class="panel">

<h2>🔬 Investigación</h2>

<button onclick="investigar()">
Investigar tecnología
</button>

</div>


</div>


<script>

let jugador;


window.onload=function(){

let datos=localStorage.getItem("pilotoFAM");

if(datos){

jugador=JSON.parse(datos);
abrirJuego();

}

}



function crearPiloto(){

let nombre=document.getElementById("nombreNuevo").value;


if(nombre==""){
alert("Escribe un nombre");
return;
}


jugador={

nombre:nombre,
qwip:50000,
nivel:1,
rango:"Cadete",
tecnologia:"Básica",
aviones:[]

};


guardar();
abrirJuego();

}



function abrirJuego(){

document.getElementById("registro").style.display="none";

document.getElementById("juego").style.display="block";

actualizar();

}
function guardar(){

localStorage.setItem(
"pilotoFAM",
JSON.stringify(jugador)
);

}



function actualizar(){

document.getElementById("nombre").innerHTML=jugador.nombre;

document.getElementById("rango").innerHTML=jugador.rango;

document.getElementById("nivel").innerHTML=jugador.nivel;

document.getElementById("qwip").innerHTML=jugador.qwip;

document.getElementById("tec").innerHTML=jugador.tecnologia;


let lista="";


jugador.aviones.forEach(function(avion){

lista+="<li>✈️ "+avion+"</li>";

});


document.getElementById("hangar").innerHTML=lista;


guardar();

}




function mision(){

let premio=Math.floor(Math.random()*10000)+5000;


jugador.qwip+=premio;

jugador.nivel++;



if(jugador.nivel>=5){

jugador.rango="Teniente";

}


if(jugador.nivel>=10){

jugador.rango="Capitán";

}


if(jugador.nivel>=20){

jugador.rango="General";

}



document.getElementById("mensaje").innerHTML=

"✅ Misión completada: +"+premio+" Qwip";


actualizar();

}




function comprar(nombre,precio){


if(jugador.qwip>=precio){


jugador.qwip-=precio;

jugador.aviones.push(nombre);


alert("✈️ Aeronave adquirida: "+nombre);


actualizar();


}else{


alert("❌ No tienes suficientes Qwip");


}


}




function investigar(){


jugador.tecnologia="Avanzada";


alert("🚀 Tecnología mejorada");


actualizar();


}



</script>


</body>

</html>
